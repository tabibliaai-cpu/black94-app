name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

jobs:
  build-android:
    name: Build Release APK
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          echo "Keystore decoded successfully"

      - name: Configure release signing
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/app/release-signing.gradle << 'GRADLE'
          android.signingConfigs {
              release {
                  storeFile file('release.keystore')
                  storePassword System.getenv("STORE_PASSWORD") ?: ""
                  keyAlias System.getenv("KEY_ALIAS") ?: ""
                  keyPassword System.getenv("KEY_PASSWORD") ?: ""
              }
          }
          android.buildTypes.all { buildType ->
              buildType.signingConfig = android.signingConfigs.release
          }
          GRADLE

          echo "" >> android/app/build.gradle
          echo "apply from: 'release-signing.gradle'" >> android/app/build.gradle
          echo "Signing config injected"

      - name: Build Release APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: cd android && ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon --console=plain

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/black94-release.apk
          ls -lh artifacts/
          
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          TAG="v${VERSION}-${TIMESTAMP}"

          gh release create "$TAG" \
            artifacts/black94-release.apk \
            --title "Black94 Build #${{ github.run_number }}" \
            --notes "Release APK from commit $SHORT_SHA. Signed with release keystore." \
            --prerelease

          echo "Release created: $TAG"
