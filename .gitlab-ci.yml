# ═══════════════════════════════════════════════════════════════════════════
#  Black94 — GitLab CI/CD Pipeline
#  Builds Debug APK + Release AAB on every push to main
#  Free GitLab.com runners · No EAS · No Android Studio
# ═══════════════════════════════════════════════════════════════════════════

image: node:20

variables:
  ANDROID_COMPILE_SDK: "35"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_SDK_TOOLS: "11076708"
  JAVA_VERSION: "17"

stages:
  - build
  - release

# ── Cache ──────────────────────────────────────────────────────────────────
.gradle_cache: &gradle_cache
  cache:
    key: gradle-$CI_COMMIT_REF_SLUG
    paths:
      - android/.gradle/caches/
      - android/.gradle/wrapper/

.npm_cache: &npm_cache
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/

# ── Debug APK Build ────────────────────────────────────────────────────────
build:debug-apk:
  stage: build
  <<: *npm_cache
  <<: *gradle_cache
  before_script:
    # Install JDK 17
    - apt-get update -qq
    - apt-get install -y -qq openjdk-17-jdk unzip > /dev/null 2>&1
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    # Install Android SDK
    - mkdir -p android-sdk/cmdline-tools
    - cd android-sdk/cmdline-tools
    - wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip" -O tools.zip
    - unzip -qo tools.zip
    - mv cmdline-tools latest
    - cd $CI_PROJECT_DIR
    - export ANDROID_HOME=$CI_PROJECT_DIR/android-sdk
    - export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$JAVA_HOME/bin:$PATH
    - yes | sdkmanager --licenses > /dev/null 2>&1
    - sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}" "platform-tools" "ndk;27.1.12297006" > /dev/null 2>&1
  script:
    - npm ci
    - npx expo prebuild --platform android --clean
    - cp black94-release.keystore android/app/release.keystore
    - cd android
    - chmod +x gradlew
    - ./gradlew assembleDebug --no-daemon --console=plain
  artifacts:
    paths:
      - android/app/build/outputs/apk/debug/app-debug.apk
    expire_in: 7 days

# ── Release AAB Build ──────────────────────────────────────────────────────
build:release-aab:
  stage: build
  <<: *npm_cache
  <<: *gradle_cache
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq openjdk-17-jdk unzip > /dev/null 2>&1
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - mkdir -p android-sdk/cmdline-tools
    - cd android-sdk/cmdline-tools
    - wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip" -O tools.zip
    - unzip -qo tools.zip
    - mv cmdline-tools latest
    - cd $CI_PROJECT_DIR
    - export ANDROID_HOME=$CI_PROJECT_DIR/android-sdk
    - export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$JAVA_HOME/bin:$PATH
    - yes | sdkmanager --licenses > /dev/null 2>&1
    - sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}" "platform-tools" "ndk;27.1.12297006" > /dev/null 2>&1
  script:
    - npm ci
    - npx expo prebuild --platform android --clean
    - cp black94-release.keystore android/app/release.keystore
    # Inject release signing config
    - |
      cat > android/app/release-signing.gradle << 'GRADLE'
      android.signingConfigs {
          release {
              storeFile file('release.keystore')
              storePassword System.getenv("STORE_PASSWORD") ?: ""
              keyAlias System.getenv("KEY_ALIAS") ?: ""
              keyPassword System.getenv("KEY_PASSWORD") ?: ""
          }
      }
      android.buildTypes.release.signingConfig = android.signingConfigs.release
      GRADLE
      echo "apply from: 'release-signing.gradle'" >> android/app/build.gradle
    - cd android
    - chmod +x gradlew
    - ./gradlew bundleRelease --no-daemon --console=plain
  artifacts:
    paths:
      - android/app/build/outputs/bundle/release/app-release.aab
    expire_in: 7 days
  only:
    - main

# ── GitHub-Style Release ───────────────────────────────────────────────────
create-release:
  stage: release
  image: alpine:latest
  needs:
    - build:debug-apk
    - build:release-aab
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - apk add --no-cache curl
    - apk add --no-cache zip
    - zip -j black94-build-$CI_COMMIT_SHORT_SHA.zip android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/bundle/release/app-release.aab
    - |
      echo "Build $CI_PIPELINE_ID completed successfully!"
      echo "Commit: $CI_COMMIT_SHA"
      echo "Branch: $CI_COMMIT_BRANCH"
      echo "Download the artifacts from this pipeline page."
  artifacts:
    paths:
      - black94-build-$CI_COMMIT_SHORT_SHA.zip
    expire_in: 30 days
